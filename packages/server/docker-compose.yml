# MuseAI 后端本地依赖
# 用法：cd packages/server && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muse
      POSTGRES_PASSWORD: muse
      POSTGRES_DB: muse
    ports:
      - '5432:5432'
    volumes:
      - muse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U muse -d muse']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - muse-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  muse-postgres-data:
  muse-redis-data:
